name: Build and Release

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build IDE and Installer
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet Packages
        run: nuget restore SharpDevelop.sln

      - name: Install Legacy .NET Reference Assemblies
        shell: pwsh
        run: |
          $frameworks = @(
            @{ name = "v4.5.2"; package = "Microsoft.NETFramework.ReferenceAssemblies.net452"; version = "1.0.3" },
            @{ name = "v4.5"; package = "Microsoft.NETFramework.ReferenceAssemblies.net45"; version = "1.0.3" },
            @{ name = "v4.0"; package = "Microsoft.NETFramework.ReferenceAssemblies.net40"; version = "1.0.3" },
            @{ name = "v3.5"; package = "Microsoft.NETFramework.ReferenceAssemblies.net35"; version = "1.0.3" }
          )
          
          foreach ($fw in $frameworks) {
            $targetPath = "C:\Program Files (x86)\Reference Assemblies\Microsoft\Framework\.NETFramework\$($fw.name)"
            if (!(Test-Path "$targetPath\System.dll")) {
                Write-Host "Installing reference assemblies for $($fw.name)..."
                New-Item -ItemType Directory -Force -Path $targetPath | Out-Null
                $zipFile = "$env:TEMP\$($fw.package).zip"
                $extractDir = "$env:TEMP\$($fw.package)"
                
                # Download package
                Invoke-WebRequest -Uri "https://www.nuget.org/api/v2/package/$($fw.package)/$($fw.version)" -OutFile $zipFile
                
                # Extract package
                Expand-Archive -Path $zipFile -DestinationPath $extractDir -Force
                
                # Copy reference assemblies
                Copy-Item -Path "$extractDir\build\.NETFramework\$($fw.name)\*" -Destination $targetPath -Recurse -Force
                
                # Clean up
                Remove-Item -Path $zipFile -Force
                Remove-Item -Path $extractDir -Recurse -Force
            } else {
                Write-Host "Reference assemblies for $($fw.name) already exist."
            }
          }

      - name: Initialize Assembly Info
        run: msbuild src/Tools/Tools.build /t:PrepareRelease

      - name: Build SharpDevelop IDE (Release)
        run: msbuild SharpDevelop.sln /p:Configuration=Release /p:Platform="Any CPU" -m

      - name: Run WiX Configuration Cleaner
        shell: powershell
        run: |
          cd src/Setup
          .\CleanWixProjects.ps1

      - name: Build Setup Installer (Release)
        run: |
          msbuild src/Setup/SharpDevelop.Setup.sln /p:Configuration=Release /p:SharpDevelopBinPath="${{ github.workspace }}\bin"

      - name: Verify Installer Output
        shell: powershell
        run: |
          $msiPath = "src/Setup/bin/SharpDevelop.msi"
          if (Test-Path $msiPath) {
              $size = (Get-Item $msiPath).Length / 1MB
              Write-Host "Successfully generated SharpDevelop.msi ($($size.ToString('F2')) MB)"
          } else {
              Write-Error "SharpDevelop.msi was not found!"
              exit 1
          }

      - name: Build Standalone Portable ZIP
        run: |
          msbuild src/Tools/Tools.build /t:PrepareXcopyZip

      - name: Verify Portable ZIP Output
        shell: powershell
        run: |
          $zipPath = "src/Tools/ZipFromMsi/bin/Debug/SharpDevelopStandalone.zip"
          if (Test-Path $zipPath) {
              $size = (Get-Item $zipPath).Length / 1MB
              Write-Host "Successfully generated SharpDevelopStandalone.zip ($($size.ToString('F2')) MB)"
              Copy-Item $zipPath "SharpDevelopPortable.zip"
          } else {
              Write-Error "SharpDevelopStandalone.zip was not found!"
              exit 1
          }

      - name: Upload Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SharpDevelop-Installer
          path: src/Setup/bin/SharpDevelop.msi

      - name: Upload Portable Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SharpDevelop-Portable
          path: SharpDevelopPortable.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src/Setup/bin/SharpDevelop.msi
            SharpDevelopPortable.zip
          draft: false
          prerelease: false
          name: Release ${{ github.ref_name }}
          body: |
            ## SharpDevelop (Fork by Gabs) - Release ${{ github.ref_name }}
            
            This is an automated release for the customized legacy fork of SharpDevelop IDE.
            
            ### Highlights of this release:
            - **Downgrade to .NET Framework 4.5.2** for maximum legacy environment compatibility.
            - **Default 32-bit x86 architecture** for new project templates and build outputs.
            - **NuGet TLS 1.2 compatibility** resolved for out-of-the-box package restores.
            - **Custom title bar branding** (`SharpDevelop (Fork by Gabs)`).
            - **Exclusion of non-essential AddIns** (Git, SVN, Profiler, F#, C++, Wix, etc.) keeping the installation lightweight.
            - **Fixed Assembly Version** (`5.2.0.5290`) to prevent startup popup collisions.
            
            ### Downloads
            - **Installer (MSI)**: `SharpDevelop.msi` (ideal for system integration)
            - **Portable (ZIP)**: `SharpDevelopPortable.zip` (ideal for no-install, folder-isolated usage)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
